upstream netbackup_proxy_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/netbackup-proxy-api.access.log;
    error_log /var/log/nginx/netbackup-proxy-api.error.log;

    client_max_body_size 20m;

    # Use this when the load balancer routes by path, for example:
    # http://load-balancer/netbackup-proxy/api/v1/...
    location /netbackup-proxy/ {
        proxy_pass http://netbackup_proxy_api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /netbackup-proxy;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # Optional direct mapping when this service owns the virtual host.
    location / {
        proxy_pass http://netbackup_proxy_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}
